baseURL = "https://hychaowang.github.io/"
languageCode = "zh-cn"
title = "StarHerder" # 你的博客标题
theme = "mainroad"

hasCJKLanguage = true  # 开启中日韩语言支持 (关键！)
summaryLength = 40    # 首页显示多少个字后折叠 (比如 140 字)

# --- 修复 1: 分页设置 (解决 paginate deprecated 警告) ---
[pagination]
  pagerSize = 10

[params]
  math = true
  description = "这是我的个人博客，记录技术与生活"
  subtitle = "Stay Hungry, Stay Foolish"
  
  widgets = ["search", "social", "recent", "categories", "taglist"]

  # --- 修复 3: Sidebar 必须是对象，不能是列表 ---
  # 这里定义侧边栏在“左边”还是“右边”
  [params.sidebar]
    home = "right"       # 首页侧边栏位置
    list = "right"       # 列表页侧边栏位置
    single = "right"     # 文章页侧边栏位置
    # widgets = ["search", "social", "recent", "categories", "taglist"] # 为了兼容性，这里也可以保留一份

  # --- 社交链接 ---
  [params.social]
    github = "https://github.com/hychaowang"
    email = "mailto:hychaowang@outlook.com"

  # --- 作者信息 ---
  [params.author]
    name = "StarHerder"
    bio = ""

# --- 顶部导航栏 ---
[menu]
  [[menu.main]]
    name = "首页"
    url = "/"
    weight = 10
  [[menu.main]]
    name = "关于我"
    url = "/about/" 
    weight = 30

# --- 代码高亮设置 ---
[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = true        # 显示行号 (可选)
    style = "monokai"     # 配色风格，可选: monokai, dracula, solarized-dark
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true  # 允许 HTML (如果你需要嵌入 iframe视频等)
  [markup.goldmark.extensions]
    [markup.goldmark.extensions.passthrough]
      enable = true
      [markup.goldmark.extensions.passthrough.delimiters]
        block = [['\[', '\]'], ['$$', '$$']]
        inline = [['\(', '\)'], ['$', '$']]