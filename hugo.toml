baseURL = "https://hychaowang.github.io/"
languageCode = "zh-cn"
title = "StarHerder" 
theme = "mainroad"

hasCJKLanguage = true  # 开启中日韩语言支持
summaryLength = 40     # 摘要长度

# --- 分页设置 ---
[pagination]
  pagerSize = 10

# --- 参数设置 ---
[params]
  math = true  # 开启公式支持
  description = "这是我的个人博客，记录技术与生活"
  subtitle = "Stay Hungry, Stay Foolish"
  
  # 侧边栏组件
  widgets = ["search", "social", "recent", "categories", "taglist"]

  # 侧边栏位置设置
  [params.sidebar]
    home = "right"       
    list = "right"       
    single = "right"     

  # --- 社交链接 (修正版) ---
  [params.social]
    github = "hychaowang"            # 👈 只填用户名
    email = "hychaowang@outlook.com" # 👈 只填邮箱

  # --- 作者信息 ---
  [params.author]
    name = "StarHerder"
    bio = ""

# --- 顶部导航栏 (修正版) ---
[menu]
  [[menu.main]]
    name = "首页"
    url = "/"
    weight = 10
  [[menu.main]]
    name = "文章"      # 👈 加上这个，否则找不到博客列表
    url = "/posts/" 
    weight = 20
  [[menu.main]]
    name = "关于我"
    url = "/about/" 
    weight = 30

# --- 代码高亮与公式配置 (优化版) ---
[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = true
    style = "monokai"
    
  [markup.goldmark.renderer]
    unsafe = true  # 允许 HTML

  # 公式渲染配置 (透传设置)
  [markup.goldmark.extensions.passthrough]
    enable = true
    [markup.goldmark.extensions.passthrough.delimiters]
      block = [['\[', '\]'], ['$$', '$$']]
      inline = [['\(', '\)'], ['$', '$']]