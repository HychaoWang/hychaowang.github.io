name: Generate articles index

on:
  push:
    paths:
      - "articles/**/*.md"
      - "scripts/generate-articles-index.mjs"
      - ".github/workflows/articles-index.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate article index
        run: node scripts/generate-articles-index.mjs

      - name: Commit article index
        run: |
          if git diff --quiet -- data/articles.json; then
            echo "Article index is already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/articles.json
          git commit -m "Update generated article index"
          git push
